<main class="container-fluid">
  <h2 class="h5">Widget shell</h2>
  <p class="text-muted">Non-Maps tabs are empty placeholders per Stage 1 plan. Parent ↔ iframe messaging demo below.</p>

  <h3>Get message from parent</h3>
  <div>
    <div id="message">Please send some message from the input above.</div>
    <script>
      window.addEventListener("message", function (event) {
        console.log(["github receive", event]);
        document.querySelector("#message").innerText =
          typeof event.data === "string"
            ? event.data
            : JSON.stringify(event.data);
      });
    </script>
  </div>

  <h3>Raise event to parent</h3>
  <div>
    <label for="messageText">Message:</label><br />
    <input class="form-control mt-2" type="text" id="messageText" /><br /><br />
    <button class="btn btn-primary" id="sendMessage" data-type="customevent">Send message to parent</button>
  </div>
</main>
